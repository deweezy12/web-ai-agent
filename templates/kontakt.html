{% extends "base.html" %}
{% block title %}Kontakt | {{ business.name }}{% endblock %}
{% block content %}
<section class="section-block subpage-start">
  <div class="container">
    <article class="contact-card reveal direct-contact-card">
      <p class="section-kicker">Kontakt</p>
      <h1 class="subpage-title">{{ business.name }}</h1>
      <p>{{ business.address_line_1 }}<br>{{ business.address_line_2 }}</p>
      <p>Telefon: <a href="tel:+49202478880">{{ business.phone }}</a></p>
      <div class="hero-actions compact-actions">
        <a href="{{ url_for('anfrage_stellen') }}" class="btn btn-primary">Zur Anfrage</a>
        <a href="{{ url_for('live_chat') }}" class="btn btn-secondary">Live-Chat</a>
      </div>
    </article>
  </div>
</section>
{% endblock %}
