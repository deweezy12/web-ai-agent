{% extends "base.html" %}
{% block title %}Live-Chat | {{ business.name }}{% endblock %}
{% block content %}
<section class="section-block subpage-start">
  <div class="container">
    <article class="chat-shell reveal chat-shell-direct" id="chat-shell">
      <div class="chat-shell-head">
        <p class="section-kicker">Live-Chat</p>
        <h1 class="subpage-title">Direkt Ihre Frage stellen</h1>
      </div>
      <div class="chat-log" id="chat-log" aria-live="polite"></div>
      <form class="chat-form" id="chat-form">
        <input id="chat-input" type="text" placeholder="Ihre Nachricht..." autocomplete="off" required>
        <button type="submit" class="btn btn-primary" id="chat-send">Senden</button>
      </form>
    </article>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
